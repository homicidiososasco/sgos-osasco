window.dbLoadAll = async () => {

    criado_por:    os.por   ||null

  if(error) console.error('dbInsertOS:', error);
  return data;
};

window.dbUpdateOS = async (id, changes) => {
  const K = {st:'status', eq:'equipe', dtEq:'data_equipe',
    ip:'ip_inquerito', vit:'vitima', av:'averiguado',
    nat:'natureza', cart:'cartorio', fin:'finalidade',
    ori:'origem', del:'delegado'};
  const row = {atualizado_em: new Date().toISOString()};
  Object.entries(changes).forEach(([k,v]) => { row[K[k]||k] = v; });
  const {error} = await SB.from('ordens_servico').update(row).eq('id', id);
  if(error) console.error('dbUpdateOS:', error);
};

    tipo:       n.tipo  ||null,
    os_id:      n.os_id ||null,
    lida:       false
  });
  if(error) console.error('dbNotif:', error);
};

window.dbNotifMany = (arr) => arr.forEach(n => window.dbNotif(n).catch(console.error));

// ── Upload de arquivo ────────────────────────────────────────────
window.dbUploadFile = async (osId, dataUrl, nome) => {
  try {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const path = `os_${osId}_${Date.now()}_${nome}`;
    const {error} = await SB.storage.from('sgos-arquivos').upload(path, blob, {contentType: blob.type});
    if(error){ console.error('upload:', error); return null; }
    const {data: urlData} = SB.storage.from('sgos-arquivos').getPublicUrl(path);
    return {path, publicUrl: urlData?.publicUrl||null};
  } catch(e){ console.error('dbUploadFile:', e); return null; }
};

window.Countdown = function({pra}){
  const calc=()=>{const ms=new Date(pra+"T23:59:59")-new Date();if(ms<=0)return{ok:false};return{d:Math.floor(ms/864e5),h:Math.floor((ms%864e5)/36e5),m:Math.floor((ms%36e5)/6e4),s:Math.floor((ms%6e4)/1e3),ok:true};};
  const[tm,setTm]=React.useState(calc);
  React.useEffect(()=>{const id=setInterval(()=>setTm(calc()),1e3);return()=>clearInterval(id);},[pra]);
  const d=df(pra);
  const clr=!tm.ok||d<=5?"var(--re)":d<=20?"var(--ye)":"var(--gr)";
  const bg=!tm.ok||d<=5?"var(--rb)":d<=20?"var(--yb)":"var(--grb)";

  return(
    <div style={{background:bg,border:`1px solid ${br}`,borderRadius:8,padding:"10px 14px",display:"inline-flex",gap:12,alignItems:"center"}}>
      {!tm.ok?<span style={{color:"var(--re)",fontFamily:"monospace",fontSize:13,fontWeight:700}}>⚠ PRAZO EXPIRADO</span>

    </div>
  );
};

        {cells.map((d,i)=>{if(!d)return<div key={i}/>;
          const iS=sel&&sel.getFullYear()===v.y&&sel.getMonth()===v.m&&sel.getDate()===d;

};

    chefe:["Investigador de Polícia","Escrivão de Polícia"],

    escrivao:["Escrivão de Polícia","Escrivão Auxiliar"],
    investigador:["Investigador de Polícia","Agente Policial"]

  const cargos=cargosMap[fA.role]||[];

    const e={};

      window.dbInsertUser(newU,fA.pin||"0000").catch(console.error);

            <input value={fA.nome} onChange={e=>sa("nome",e.target.value)} placeholder="Nome completo" className={inpA("nome")}/>

          <div style={{marginBottom:12}}>

                  return<button key={eq} onClick={()=>sa("eq",eq)} style={{padding:"10px 4px",borderRadius:6,textAlign:"center",border:`1px solid ${erA.eq?"var(--re)":on?"var(--go)":"var(--bd)"}`,background:on?"var(--gb)":"var(--p2)",color:on?"var(--go)":"var(--ts)",cursor:"pointer"}}>

          return<div key={r} style={{marginBottom:16}}>
            <div style={{fontFamily:"monospace",fontSize:10,letterSpacing:2,color:"var(--go)",marginBottom:8,textTransform:"uppercase"}}>{rl[r]} ({g.length})</div>
            {r==="investigador"

                <div key={eq} style={{marginBottom:10}}>

        })}
      </div>
    </div>
  );
};

</script><script type="text/babel" data-presets="react">
window.TabDashboard = function({ordens, users}){
  const cEq=React.useRef(),cNat=React.useRef(),cTmp=React.useRef(),cTl=React.useRef();
  const inst=React.useRef({});
  const dk=document.documentElement.classList.contains("dark");
  const gc=dk?"rgba(228,221,212,.7)":"rgba(28,26,24,.7)";
  const grd=dk?"rgba(34,51,84,.6)":"rgba(221,216,207,.5)";
  const go=dk?"#c8a84b":"#9e7328";

  React.useEffect(()=>{
    Object.values(inst.current).forEach(c=>c&&c.destroy&&c.destroy());
    const eqs=["A","B","C","D"];
    const nats=[...new Set(ordens.map(o=>o.nat))].slice(0,8);
    const PALETTE=[go,"#4a9ee8","#38c068","#e05040","#d4a820","#9b59b6","#e67e22","#1abc9c"];

    // Chart 1 — O.S. por Equipe (stacked bar)
    if(cEq.current){
      inst.current.eq=new Chart(cEq.current,{
        type:"bar",
        data:{
          labels:eqs.map(e=>`Equipe ${e}`),
          datasets:[
            {label:"Pendente",data:eqs.map(eq=>ordens.filter(o=>o.eq===eq&&o.st==="pendente").length),backgroundColor:"rgba(224,80,64,.7)",borderRadius:4},
            {label:"Em Curso",data:eqs.map(eq=>ordens.filter(o=>o.eq===eq&&o.st==="distribuida").length),backgroundColor:"rgba(74,158,232,.7)",borderRadius:4},
            {label:"Finalizada",data:eqs.map(eq=>ordens.filter(o=>o.eq===eq&&o.st==="finalizada").length),backgroundColor:"rgba(56,192,104,.7)",borderRadius:4},
          ]
        },
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:gc,font:{size:10}}},title:{display:true,text:"O.S. por Equipe",color:go,font:{size:12,weight:"700"}}},scales:{x:{stacked:true,ticks:{color:gc,font:{size:10}},grid:{color:grd}},y:{stacked:true,ticks:{color:gc,font:{size:10},stepSize:1},grid:{color:grd},beginAtZero:true}}}
      });
    }

    // Chart 2 — Natureza (doughnut)
    const natCounts=nats.map(n=>ordens.filter(o=>o.nat===n).length);
    if(cNat.current){
      inst.current.nat=new Chart(cNat.current,{
        type:"doughnut",
        data:{labels:nats,datasets:[{data:natCounts,backgroundColor:PALETTE,borderColor:"transparent",hoverOffset:6}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:"62%",plugins:{legend:{position:"bottom",labels:{color:gc,font:{size:10},padding:10}},title:{display:true,text:"Natureza das Ocorrências",color:go,font:{size:12,weight:"700"}}}}
      });
    }

    // Chart 3 — Tempo médio por equipe (bar horizontal)
    const tmpData=eqs.map(eq=>{
      const fin=ordens.filter(o=>o.eq===eq&&o.st==="finalizada"&&o.emi&&o.pra);
      if(!fin.length)return 0;
      const avg=fin.reduce((s,o)=>{
        const d=Math.round((new Date(o.pra+"T12:00:00")-new Date(o.emi+"T12:00:00"))/864e5);
        return s+d;
      },0)/fin.length;
      return Math.round(avg);
    });
    if(cTmp.current){
      inst.current.tmp=new Chart(cTmp.current,{
        type:"bar",
        data:{labels:eqs.map(e=>`Equipe ${e}`),datasets:[{label:"Dias médios",data:tmpData,backgroundColor:PALETTE.slice(0,4),borderRadius:6}]},
        options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:"Prazo Médio Utilizado (dias)",color:go,font:{size:12,weight:"700"}}},scales:{x:{ticks:{color:gc,font:{size:10}},grid:{color:grd},beginAtZero:true},y:{ticks:{color:gc,font:{size:10}},grid:{color:grd}}}}
      });
    }

    // Chart 4 — Timeline (line: OS emitidas por semana)
    const now=new Date();
    const weeks=[];
    for(let i=7;i>=0;i--){
      const s=new Date(now);s.setDate(now.getDate()-i*7);
      const e=new Date(s);e.setDate(s.getDate()+6);
      weeks.push({label:`S-${i}`,s,e});
    }
    const tlData=weeks.map(w=>ordens.filter(o=>{if(!o.emi)return false;const d=new Date(o.emi+"T12:00:00");return d>=w.s&&d<=w.e;}).length);
    if(cTl.current){
      inst.current.tl=new Chart(cTl.current,{
        type:"line",
        data:{labels:weeks.map(w=>w.label),datasets:[{label:"O.S. emitidas",data:tlData,borderColor:go,backgroundColor:"rgba(200,168,75,.12)",fill:true,tension:.4,pointBackgroundColor:go,pointRadius:4}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:"O.S. Emitidas — Últimas 8 Semanas",color:go,font:{size:12,weight:"700"}}},scales:{x:{ticks:{color:gc,font:{size:10}},grid:{color:grd}},y:{ticks:{color:gc,font:{size:10},stepSize:1},grid:{color:grd},beginAtZero:true}}}
      });
    }
    return()=>Object.values(inst.current).forEach(c=>c&&c.destroy&&c.destroy());
  },[ordens]);

  const tot=ordens.length;
  const pend=ordens.filter(o=>o.st==="pendente").length;
  const cur=ordens.filter(o=>o.st==="distribuida").length;
  const fin=ordens.filter(o=>o.st==="finalizada").length;
  const venc=ordens.filter(o=>o.st!=="finalizada"&&window.df(o.pra)<=0).length;
  const txF=tot?Math.round(fin/tot*100):0;
  const tMed=()=>{
    const f=ordens.filter(o=>o.st==="finalizada"&&o.emi&&o.pra);
    if(!f.length)return"—";
    const avg=f.reduce((s,o)=>s+Math.round((new Date(o.pra+"T12:00:00")-new Date(o.emi+"T12:00:00"))/864e5),0)/f.length;
    return Math.round(avg)+"d";
  };

  const KPI=({ic,v,l,cl,bg})=>(
    <div style={{background:bg||"var(--panel)",border:"1px solid var(--bd)",borderRadius:10,padding:"14px 12px",textAlign:"center",flex:1,minWidth:80}}>
      <div style={{fontSize:20,marginBottom:4}}>{ic}</div>
      <div style={{fontFamily:"monospace",fontSize:22,fontWeight:700,color:cl||"var(--go)",lineHeight:1}}>{v}</div>
      <div style={{fontSize:10,color:"var(--ts)",marginTop:4,lineHeight:1.3}}>{l}</div>
    </div>
  );

  return(
    <div className="fi">
      <h2 style={{fontSize:15,fontWeight:700,marginBottom:16,color:"var(--tx)"}}>📈 Dashboard Gerencial</h2>
      <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
        <KPI ic="📋" v={tot} l="Total"/>
        <KPI ic="⏳" v={pend} l="Pendentes" cl="var(--re)" bg="var(--rb)"/>
        <KPI ic="🔄" v={cur} l="Em Curso" cl="var(--bl)" bg="var(--blb)"/>
        <KPI ic="✅" v={fin} l="Finalizadas" cl="var(--gr)" bg="var(--grb)"/>
        <KPI ic="🚨" v={venc} l="Vencidas" cl="var(--re)" bg="var(--rb)"/>
        <KPI ic="📊" v={txF+"%"} l="Taxa Conclusão" cl="var(--go)"/>
        <KPI ic="⏱" v={tMed()} l="Prazo Médio" cl="var(--ye)"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <div className="card" style={{height:240,position:"relative",marginBottom:0}}><canvas ref={cEq}/></div>
        <div className="card" style={{height:240,position:"relative",marginBottom:0}}><canvas ref={cNat}/></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div className="card" style={{height:200,position:"relative",marginBottom:0}}><canvas ref={cTmp}/></div>
        <div className="card" style={{height:200,position:"relative",marginBottom:0}}><canvas ref={cTl}/></div>
      </div>
    </div>
  );
};

window.TabExportar = function({ordens, users}){

window.TabNovaOSEmergencial = function({ordens,users,meId,me,toast,setOrdens,setNotifs,setTab}){
  const[arq,setArq]=React.useState(null);
  const[relArq,setRelArq]=React.useState(null);
  const[sol,setSol]=React.useState("");
  const[data,setData]=React.useState(td());
  const[dilig,setDilig]=React.useState(null);
  const[er,setEr]=React.useState({});
  const[sent,setSent]=React.useState(null);
  const[finalizado,setFinalizado]=React.useState(false);

  const solList=React.useMemo(()=>users.filter(u=>["delegado","chefe","escrivao"].includes(u.role)),[users]);
  const chefes=React.useMemo(()=>users.filter(u=>u.role==="chefe"),[users]);

  const notifChefe=(num,extra)=>chefes.map(c=>({id:uid(),uid:c.id,msg:`🚨 EMERGENCIAL — Equipe ${me.eq} (${me.nome}) solicita inclusão no Livro/Painel. O.S. ${num}. ${extra||""}`,t:nt(),lida:false}));
  const notifSol=(num,solId,txt)=>({id:uid(),uid:solId,msg:`✅ O.S. ${num} — ${txt}`,t:nt(),lida:false});

  const enviar=()=>{
    const e={};
    if(!arq)e.arq=true;
    if(!sol)e.sol=true;
    if(!data)e.data=true;
    if(dilig===null)e.dilig=true;
    setEr(e);
    if(Object.keys(e).length){toast("Corrija os campos obrigatórios","err");return;}
    const solId=parseInt(sol);
    const solNome=solList.find(u=>u.id===solId)?.nome||"";
    const pra=addD(data,1);
    const num=`${String(ordens.length+1).padStart(3,"0")}/${new Date().getFullYear()}`;
    const reader=new FileReader();
    reader.onload=ev=>{
      const novaOs={
        id:uid(),num,ip:"",vit:`Diligência — ${arq.name}`,av:"",
        nat:"Diligência Emergencial",cart:"",pri:"emer",
        emi:data,pra,ori:"",
        fin:dilig==="sim"?"Resultará em relatório":"Sem relatório",
        del:solNome,st:"emerg_pendente",eq:me.eq,dtEq:data,rel:null,
        por:meId,dilig_rel:dilig,sol_id:solId,arq_nome:arq.name,
        arq_data:ev.target.result,arq_type:arq.type
      };
      setOrdens(o=>[...o,novaOs]);
      window.dbInsertOS(novaOs).then(row=>{
        if(row&&novaOs.arq_data)window.dbUploadFile(row.id,novaOs.arq_data,novaOs.arq_nome).catch(console.error);
      }).catch(console.error);
      const notifs=[
        ...notifChefe(num,`Solicitante: ${solNome}. Arquivo: ${arq.name}`,novaOs.id),
        notifSol(num,solId,`Criada pela Equipe ${me.eq}. ${dilig==="sim"?"Relatório pendente.":"Aguardando finalização."}`)
      ];
      setNotifs(n=>[...n,...notifs]);
      window.dbNotifMany(notifs);
      setSent(novaOs);
      toast("O.S. Emergencial criada! Chefe e solicitante notificados.","ok2");
    };
    reader.readAsDataURL(arq);
  };

  const finalizarOS=(osId,withRel)=>{
    setOrdens(o=>o.map(x=>x.id===osId?{...x,st:"finalizada",...(withRel&&relArq?{rel:{nome:relArq.name,dt:td()}}:{})}:x));
    const num=sent?.num||"";
    const solId=sent?.sol_id;
    const notifs=[
      ...notifChefe(num,`Equipe ${me.eq} finalizou a O.S.${withRel?" Com relatório anexado.":""}`),
      ...(solId?[notifSol(num,solId,`Finalizada pela Equipe ${me.eq}.${withRel?" Relatório entregue.":""}`)]:[] )
    ];
    setNotifs(n=>[...n,...notifs]);
      window.dbNotifMany(notifs);
    setFinalizado(true);
    toast("O.S. Finalizada com sucesso!","ok2");
    setTimeout(()=>setTab("minhas_ordens"),1500);
  };

  if(finalizado)return(
    <div className="fi" style={{maxWidth:480,margin:"0 auto",textAlign:"center",padding:40}}>
      <div style={{fontSize:48,marginBottom:12}}>✅</div>
      <div style={{fontSize:18,fontWeight:700,color:"var(--gr)",marginBottom:6}}>O.S. Finalizada!</div>
      <div style={{fontSize:14,color:"var(--ts)"}}>Redirecionando para Minhas Ordens...</div>
    </div>
  );

  if(sent)return(
    <div className="fi" style={{maxWidth:520,margin:"0 auto"}}>
      <div style={{background:"var(--grb)",border:"1px solid var(--gr)",borderRadius:12,padding:22,textAlign:"center",marginBottom:16}}>
        <div style={{fontSize:36,marginBottom:8}}>✅</div>
        <div style={{fontSize:16,fontWeight:700,color:"var(--gr)",marginBottom:4}}>O.S. Criada e Chefe Notificado</div>
        <div style={{fontFamily:"monospace",fontSize:15,color:"var(--go)",fontWeight:700,marginBottom:4}}>{sent.num}</div>
        <div style={{fontSize:13,color:"var(--ts)"}}>Prazo: {fd(sent.pra)} · Equipe {sent.eq}</div>
      </div>

      {sent.dilig_rel==="sim"&&(
        <div className="card">
          <div style={{fontSize:14,fontWeight:700,color:"var(--tx)",marginBottom:12}}>📎 Anexar Relatório</div>
          <div
            style={{background:relArq?"var(--grb)":"var(--p2)",border:`1px dashed ${relArq?"var(--gr)":"var(--bd)"}`,borderRadius:8,padding:16,textAlign:"center",cursor:"pointer"}}
            onClick={()=>document.getElementById("rel-emer-upload").click()}>
            <div style={{fontSize:26,marginBottom:4}}>{relArq?"📄":"📎"}</div>
            <div style={{fontSize:13,color:relArq?"var(--gr)":"var(--ts)",fontWeight:relArq?600:400}}>
              {relArq?relArq.name:"Clique para selecionar PDF do relatório"}
            </div>
            <input id="rel-emer-upload" type="file" accept=".pdf" style={{display:"none"}}
              onChange={e=>{if(e.target.files[0])setRelArq(e.target.files[0]);}}/>
          </div>
          <button
            className="btn-gold"
            style={{marginTop:14,opacity:relArq?1:.45,cursor:relArq?"pointer":"not-allowed",fontSize:13}}
            onClick={()=>relArq&&finalizarOS(sent.id,true)}>
            ✓ Finalizar O.S. com Relatório
          </button>
        </div>
      )}

      {sent.dilig_rel==="nao"&&(
        <div className="card" style={{textAlign:"center"}}>
          <div style={{fontSize:13,color:"var(--ts)",marginBottom:16}}>Diligência sem relatório. Confirme a finalização quando concluída.</div>
          <button className="btn-gold" style={{fontSize:13}} onClick={()=>finalizarOS(sent.id,false)}>
            ✓ Finalizar O.S.
          </button>
        </div>
      )}

      <button onClick={()=>{setSent(null);setArq(null);setSol("");setDilig(null);setRelArq(null);setEr({});}}
        style={{background:"none",border:"none",color:"var(--tm)",fontSize:13,cursor:"pointer",padding:"10px 0",display:"block",marginTop:4}}>
        ← Nova diligência
      </button>
    </div>
  );

  return(
    <div className="fi" style={{maxWidth:520,margin:"0 auto"}}>
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:6,color:"var(--tx)"}}>🚨 Nova O.S. Emergencial</h2>
      <div style={{background:"var(--rb)",border:"1px solid var(--rbd)",borderRadius:7,padding:"9px 14px",marginBottom:16,fontSize:13,color:"var(--re)",fontFamily:"monospace"}}>
        Prazo automático: <strong>1 dia útil</strong> · Prioridade Emergencial
      </div>
      <div className="card">

        {/* Upload arquivo */}
        <div style={{marginBottom:14}}>
          <label className="lbl">Arquivo (imagem ou PDF) *</label>
          <div
            style={{background:er.arq?"var(--rb)":arq?"var(--grb)":"var(--p2)",border:`1px dashed ${er.arq?"var(--re)":arq?"var(--gr)":"var(--bd)"}`,borderRadius:8,padding:18,textAlign:"center",cursor:"pointer"}}
            onClick={()=>document.getElementById("arq-emer-main").click()}>
            <div style={{fontSize:28,marginBottom:4}}>{arq?"📄":"📎"}</div>
            <div style={{fontSize:13,color:arq?"var(--gr)":"var(--ts)",fontWeight:arq?600:400}}>
              {arq?arq.name:"Clique para selecionar arquivo"}
            </div>
            <div style={{fontSize:11,color:"var(--tm)",marginTop:3}}>PDF, JPG, PNG, HEIC</div>
            <input id="arq-emer-main" type="file" accept=".pdf,.jpg,.jpeg,.png,.heic" style={{display:"none"}}
              onChange={e=>{if(e.target.files[0]){setArq(e.target.files[0]);setEr(v=>({...v,arq:null}));}}}/>
          </div>
        </div>

        {/* Solicitante */}
        <div style={{marginBottom:14}}>
          <label className="lbl">Solicitante *</label>
          <select value={sol} onChange={e=>{setSol(e.target.value);setEr(v=>({...v,sol:null}));}} className={`inp${er.sol?" err":""}`}>
            <option value="">— Selecione o solicitante —</option>
            {solList.map(u=><option key={u.id} value={u.id}>{u.nome} · {RL[u.role]}</option>)}
          </select>
        </div>

        {/* Data */}
        <div style={{marginBottom:14}}>
          <label className="lbl">Data *</label>
          <input type="date" value={data} onChange={e=>{setData(e.target.value);setEr(v=>({...v,data:null}));}} className={`inp${er.data?" err":""}`}/>
        </div>

        {/* Diligência resultará em relatório? */}
        <div style={{marginBottom:18}}>
          <label className="lbl" style={{marginBottom:10,fontSize:14}}>Diligência resultará em relatório? *</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[["sim","✅ Sim","Relatório obrigatório"],["nao","❌ Não","Somente finalização"]].map(([v,l,sub])=>(
              <button key={v} onClick={()=>{setDilig(v);setEr(ev=>({...ev,dilig:null}));}}
                style={{padding:"16px 10px",borderRadius:8,textAlign:"center",border:`2px solid ${er.dilig?"var(--re)":dilig===v?"var(--go)":"var(--bd)"}`,background:dilig===v?"var(--gb)":"var(--p2)",cursor:"pointer"}}>
                <div style={{fontSize:16,fontWeight:700,color:dilig===v?"var(--go)":"var(--tx)"}}>{l}</div>
                <div style={{fontSize:11,color:"var(--tm)",marginTop:3}}>{sub}</div>
              </button>
            ))}
          </div>
          {dilig&&(
            <div style={{marginTop:10,padding:"10px 14px",background:"var(--p2)",borderRadius:7,fontSize:12,color:"var(--ts)",lineHeight:1.5}}>
              {dilig==="sim"
                ?"📋 Chefe e solicitante serão notificados. Após criação, será liberado upload do relatório para finalização."

          )}

        <button className="btn-gold" onClick={enviar}>🚨 ENVIAR DILIGÊNCIA EMERGENCIAL</button>
      </div>
    </div>
  );
};
</script><script type="text/babel" data-presets="react">
window.TabRevisarEmergencial = function({ordens, users, meId, setOrdens, setNotifs, toast, setTab}){
  const pendentes = ordens.filter(o => o.st === "emerg_pendente");
  const[sel, setSel] = React.useState(null);
  const[form, setForm] = React.useState({});
  const[er, setEr] = React.useState({});

  const sf = (k,v) => { setForm(f=>({...f,[k]:v})); setEr(e=>({...e,[k]:null})); };

  const abrir = (os) => {
    setSel(os);
    setForm({
      ip: os.ip||"",
      vit: os.vit||"",
      av: os.av||"",
      nat: os.nat||"",
      cart: os.cart||"",
      fin: os.fin||"",
      ori: os.ori||"",
      del: os.del||""
    });
    setEr({});
  };

  const confirmar = () => {
    const e={};
    if(!form.vit.trim()) e.vit=true;
    if(!form.nat) e.nat=true;
    setEr(e);
    if(Object.keys(e).length){ toast("Preencha os campos obrigatórios","err"); return; }

    setOrdens(o=>o.map(x=>x.id===sel.id?{
      ...x, ...form,
      vit: form.vit.toUpperCase(),
      st: "distribuida",
      revisado_por: meId,
      revisado_em: td()
    }:x));
    window.dbUpdateOS(sel.id,{
      ...form, vit:form.vit.toUpperCase(),
      st:"distribuida", revisado_por:meId, revisado_em:td()
    }).catch(console.error);

    // Notify solicitante (sol_id stored on OS)
    if(sel.sol_id){
      setNotifs(n=>[...n,{
        id:uid(), uid:sel.sol_id,
        msg:`✅ O.S. ${sel.num} foi revisada e incluída no Livro Digital pelo Chefe. Equipe ${sel.eq}.`,
        t:nt(), lida:false
      }]);
    }
    // Notify the investigador who created it
    if(sel.por && sel.por !== sel.sol_id){
      setNotifs(n=>[...n,{
        id:uid(), uid:sel.por,
        msg:`✅ O.S. ${sel.num} revisada e incluída no painel pelo Chefe.`,
        t:nt(), lida:false
      }]);
    }

    toast(`O.S. ${sel.num} confirmada e incluída no Livro Digital!`, "ok2");
    setSel(null);
  };

  const agNome = (id) => users.find(u=>u.id===id)?.nome || "—";

  if(sel) return(
    <div className="fi" style={{maxWidth:580, margin:"0 auto"}}>

      </div>

      <div style={{background:"var(--rb)",border:"1px solid var(--rbd)",borderRadius:8,padding:"12px 16px",marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--re)",fontFamily:"monospace",marginBottom:8,letterSpacing:1}}>DADOS ENVIADOS PELO AGENTE</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:13}}>
          <div><span style={{color:"var(--tm)"}}>Agente: </span><span style={{fontWeight:600,color:"var(--tx)"}}>{agNome(sel.por)}</span></div>
          <div><span style={{color:"var(--tm)"}}>Equipe: </span><span style={{fontWeight:700,color:"var(--bl)"}}>Equipe {sel.eq}</span></div>
          <div><span style={{color:"var(--tm)"}}>Solicitante: </span><span style={{fontWeight:600,color:"var(--tx)"}}>{sel.del||"—"}</span></div>
          <div><span style={{color:"var(--tm)"}}>Data: </span><span style={{color:"var(--tx)"}}>{fd(sel.emi)}</span></div>
          <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <span style={{color:"var(--tm)"}}>Arquivo: </span>
              <span style={{color:"var(--gr)",fontWeight:600}}>{sel.arq_nome||"—"}</span>
              {sel.arq_data&&(
                <a href={sel.arq_data} download={sel.arq_nome}
                  style={{display:"inline-flex",alignItems:"center",gap:6,background:"var(--go)",color:"#1a1a1a",fontFamily:"monospace",fontWeight:700,fontSize:11,padding:"5px 12px",borderRadius:6,textDecoration:"none",letterSpacing:.5}}>
                  ⬇ Baixar arquivo
                </a>
              )}
              {sel.arq_data&&sel.arq_type&&sel.arq_type.startsWith("image/")&&(
                <img src={sel.arq_data} alt="Arquivo da diligência"
                  style={{display:"block",maxWidth:"100%",maxHeight:200,borderRadius:6,border:"1px solid var(--bd)",marginTop:6,objectFit:"contain"}}/>
              )}
            </div>
          <div><span style={{color:"var(--tm)"}}>Relatório: </span><span style={{color:"var(--tx)"}}>{sel.dilig_rel==="sim"?"Sim — obrigatório":"Não"}</span></div>
          <div style={{gridColumn:"1/-1"}}><span style={{color:"var(--tm)"}}>Natureza (campo): </span><span style={{color:"var(--tx)"}}>{sel.nat||"—"}</span></div>
        </div>

      {/* Editable fields — chief completes */}
      <div className="card">
        <div style={{fontSize:13,fontWeight:700,color:"var(--go)",fontFamily:"monospace",marginBottom:14,letterSpacing:1}}>COMPLETAR E CONFIRMAR O.S.</div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div>
            <label className="lbl">IP / Inquérito</label>
            <input value={form.ip||""} onChange={e=>sf("ip",e.target.value)} className="inp" placeholder="Nº do IP ou Inquérito"/>
          </div>
          <div>
            <label className="lbl">Cartório</label>
            <input value={form.cart||""} onChange={e=>sf("cart",e.target.value)} className="inp" placeholder="Nome do cartório"/>
          </div>
        </div>

        <div style={{marginBottom:12}}>
          <label className="lbl">Vítima / Objeto da Diligência *</label>
          <input value={form.vit||""} onChange={e=>sf("vit",e.target.value)} className={`inp${er.vit?" err":""}`} placeholder="Nome da vítima ou descrição"/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div>
            <label className="lbl">Natureza *</label>
            <select value={form.nat||""} onChange={e=>sf("nat",e.target.value)} className={`inp${er.nat?" err":""}`}>
              <option value="">— Selecione —</option>
              {NATS.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          <div>
            <label className="lbl">Averiguado</label>
            <input value={form.av||""} onChange={e=>sf("av",e.target.value)} className="inp" placeholder="Nome do averiguado"/>
          </div>
        </div>

        <div style={{marginBottom:12}}>
          <label className="lbl">Finalidade</label>
          <input value={form.fin||""} onChange={e=>sf("fin",e.target.value)} className="inp" placeholder="Finalidade da diligência"/>
        </div>

        <div style={{marginBottom:16}}>
          <label className="lbl">Origem</label>
          <input value={form.ori||""} onChange={e=>sf("ori",e.target.value)} className="inp" placeholder="Origem da ordem"/>
        </div>

        <button className="btn-gold" onClick={confirmar}>
          ✅ CONFIRMAR E INCLUIR NO LIVRO DIGITAL
        </button>
        <div style={{fontSize:12,color:"var(--tm)",marginTop:8,textAlign:"center"}}>
          Ao confirmar: status muda para Em Curso e O.S. entra no Livro/Painel normalmente.
        </div>
      </div>
    </div>
  );

  return(
    <div className="fi">
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:6,color:"var(--tx)"}}>🚨 O.S. Emergenciais — Revisão Pendente</h2>
      {!pendentes.length?(
        <div style={{background:"var(--grb)",border:"1px solid var(--gr)",borderRadius:10,padding:28,textAlign:"center",marginTop:16}}>
          <div style={{fontSize:32,marginBottom:8}}>✅</div>
          <div style={{fontSize:15,color:"var(--gr)",fontWeight:600}}>Nenhuma O.S. emergencial aguardando revisão</div>
        </div>
      ):(
        <>
          <div style={{background:"var(--rb)",border:"1px solid var(--rbd)",borderRadius:7,padding:"9px 14px",marginBottom:16,fontSize:13,color:"var(--re)",fontFamily:"monospace"}}>
            {pendentes.length} O.S. aguardando revisão e inclusão no Livro Digital
          </div>
          {pendentes.map(os=>(
            <div key={os.id} className="card" style={{display:"flex",alignItems:"center",gap:14,marginBottom:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                  <span style={{fontFamily:"monospace",fontWeight:700,color:"var(--re)",fontSize:15}}>{os.num}</span>
                  <span style={{fontFamily:"monospace",fontSize:11,background:"var(--rb)",color:"var(--re)",padding:"2px 7px",borderRadius:3,border:"1px solid var(--rbd)"}}>🚨 EMERG.</span>
                </div>
                <div style={{fontSize:14,color:"var(--tx)",fontWeight:600,marginBottom:2}}>{os.vit}</div>
                <div style={{fontSize:12,color:"var(--ts)"}}>{fd(os.emi)} · Prazo {fd(os.pra)} · Equipe {os.eq} · {agNome(os.por)}</div>
                {os.arq_nome&&<div style={{fontSize:11,color:"var(--gr)",marginTop:2}}>📎 {os.arq_nome}</div>}
              </div>
              <button onClick={()=>abrir(os)}
                style={{background:"var(--go)",border:"none",color:"#1a1a1a",fontFamily:"monospace",fontWeight:700,fontSize:12,borderRadius:7,padding:"10px 16px",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
                Revisar →
              </button>
            </div>
          ))}
        </>
      )}
    </div>
  );
};
</script>
</body>
</html>
